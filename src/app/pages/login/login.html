<div class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <a routerLink="/" class="back-link"><i class="ti ti-arrow-left"></i> Voltar</a>
        <div class="logo-icon">♪</div>
        <h2>{{ isRegistering() ? 'Criar Conta' : 'Bem-vindo de volta' }}</h2>
        <p>{{ isRegistering() ? 'Junte-se à Symphonic e tenha acesso a ofertas exclusivas.' : 'Acesse sua conta para continuar comprando.' }}</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        
        @if (isRegistering()) {
          <div class="input-group">
            <label for="nome">Nome Completo</label>
            <div class="input-wrapper">
              <i class="ti ti-user"></i>
              <input 
                type="text" 
                id="nome" 
                name="nome"
                placeholder="Seu nome"
                [ngModel]="nome()"
                (ngModelChange)="nome.set($event)"
                required
              >
            </div>
          </div>
        }

        <div class="input-group">
          <label for="email">E-mail</label>
          <div class="input-wrapper">
            <i class="ti ti-mail"></i>
            <input 
              type="email" 
              id="email" 
              name="email"
              placeholder="seu@email.com"
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              required
            >
          </div>
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <div class="input-wrapper">
            <i class="ti ti-lock"></i>
            <input 
              type="password" 
              id="senha" 
              name="senha"
              placeholder="••••••••"
              [ngModel]="senha()"
              (ngModelChange)="senha.set($event)"
              required
            >
          </div>
        </div>

        <button type="submit" class="btn-submit">
          {{ isRegistering() ? 'Cadastrar' : 'Entrar' }}
        </button>

      </form>

      <div class="login-footer">
        <p>
          {{ isRegistering() ? 'Já tem uma conta?' : 'Ainda não tem conta?' }}
          <button type="button" class="btn-toggle" (click)="toggleMode()">
            {{ isRegistering() ? 'Fazer login' : 'Cadastre-se' }}
          </button>
        </p>
      </div>
    </div>
  </div>
</div>
